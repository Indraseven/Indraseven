name: Base Sepolia Heartbeat
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IZIN WAJIB
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: Run Heartbeat
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node src/monitor.js
      - name: Push Updates
        run: |
          git config --global user.name "Indraseven"
          git config --global user.email "Indrasevenid"
          git add README.md
          git commit -m "docs: auto-update dashboard [skip ci]" || exit 0
          git push
          
